<!DOCTYPE html>
<html>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

  <!-- Disable zooming: -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <head>
    <title>Rust Robotics</title>
    <link rel="manifest" href="manifest.json" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="white"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#404040"
    />
    <link rel="apple-touch-icon" href="icon_ios_touch_192.png" />

    <style>
      html {
        /* Remove touch delay: */
        touch-action: manipulation;
      }

      body {
        /* Light mode background color for what is not covered by the egui canvas,
            or where the egui canvas is translucent. */
        background: #909090;
      }

      html.embedded-theme-light body {
        background: #efeae3;
      }

      html.embedded-theme-dark body {
        background: #11151c;
      }

      html.embedded-focused:not(.embedded-pendulum-dom),
      html.embedded-focused:not(.embedded-pendulum-dom) body {
        background: transparent;
      }

      html.embedded-pendulum-dom,
      html.embedded-pendulum-dom body {
        overflow: visible;
      }

      html.embedded-pendulum-dom body {
        --embed-accent: #e67a4c;
        --embed-accent-soft: #c6613b;
        --embed-panel: #11151c;
        --embed-panel-alt: #181d26;
        --embed-panel-strong: #1f2530;
        --embed-panel-hover: #2a3240;
        --embed-text: #e9eef5;
        --embed-text-muted: #99a5b4;
        --embed-border: #3a4554;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 10px !important;
        box-sizing: border-box;
        height: auto;
        min-height: 100%;
      }

      html.embedded-theme-light.embedded-pendulum-dom body {
        --embed-accent: #e67a4c;
        --embed-accent-soft: #c6613b;
        --embed-panel: #f7f4f0;
        --embed-panel-alt: #efeae3;
        --embed-panel-strong: #e5ded5;
        --embed-panel-hover: #ebe2d8;
        --embed-text: #2b313b;
        --embed-text-muted: #6f7884;
        --embed-border: #bfb2a5;
      }

      html.embedded-pendulum-dom.embedded-pendulum-graph body {
        padding-bottom: 18px !important;
      }

      @media (prefers-color-scheme: dark) {
        body {
          /* Dark mode background color for what is not covered by the egui canvas,
                or where the egui canvas is translucent. */
          background: #404040;
        }
      }

      /* Allow canvas to fill entire web page: */
      html,
      body {
        overflow: hidden;
        margin: 0 !important;
        padding: 0 !important;
        height: 100%;
        width: 100%;
      }

      /* Canvas fills viewport - matches official eframe template */
      canvas {
        margin-right: auto;
        margin-left: auto;
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      html.embedded-pendulum-dom .canvas-shell {
        position: relative;
        order: 1;
        flex: 0 0 auto;
        width: 100%;
        aspect-ratio: 16 / 9;
        min-height: 280px;
        max-height: 420px;
        background: var(--embed-panel);
        border-radius: 16px;
        overflow: hidden;
      }

      html.embedded-pendulum-dom.embedded-pendulum-graph .canvas-shell {
        aspect-ratio: auto;
        height: clamp(700px, 82vw, 900px);
        min-height: 700px;
        max-height: 900px;
      }

      html.embedded-pendulum-dom .canvas-shell > canvas {
        position: relative;
        inset: auto;
        width: 100%;
        height: 100%;
        border-radius: inherit;
      }

      .embed-dom-toolbar {
        display: none;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--embed-border);
        background: color-mix(in srgb, var(--embed-panel-alt) 88%, transparent);
        color: var(--embed-text);
        font: 13px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html.embedded-pendulum-dom .embed-dom-toolbar {
        display: flex;
        order: 2;
      }

      .embed-dom-toolbar button {
        appearance: none;
        border: 1px solid var(--embed-border);
        background: color-mix(in srgb, var(--embed-panel-strong) 94%, transparent);
        color: inherit;
        border-radius: 999px;
        padding: 0.45rem 0.8rem;
        font: inherit;
        cursor: pointer;
      }

      .embed-dom-toolbar button:hover {
        background: var(--embed-panel-hover);
        border-color: var(--embed-accent);
      }

      .embed-dom-toolbar label {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        white-space: nowrap;
      }

      .embed-dom-toolbar input[type="range"] {
        accent-color: var(--embed-accent);
      }

      .embed-dom-toolbar .toolbar-readout {
        color: var(--embed-text-muted);
        font-variant-numeric: tabular-nums;
      }

      .embed-dom-pendulums {
        display: none;
        gap: 10px;
        flex-wrap: wrap;
      }

      html.embedded-pendulum-dom .embed-dom-pendulums {
        display: flex;
        order: 3;
      }

      .pendulum-dom-card {
        min-width: 220px;
        max-width: 260px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--embed-border);
        background: color-mix(in srgb, var(--embed-panel-alt) 88%, transparent);
        color: var(--embed-text);
        font: 13px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .pendulum-dom-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 0.5rem;
      }

      .pendulum-dom-card select,
      .pendulum-dom-card button {
        font: inherit;
      }

      .pendulum-dom-card select {
        width: 100%;
        margin-top: 0.45rem;
        padding: 0.35rem 0.5rem;
        border-radius: 10px;
        border: 1px solid var(--embed-border);
        background: var(--embed-panel-strong);
        color: inherit;
      }

      .pendulum-dom-card .card-remove {
        border: 1px solid var(--embed-border);
        background: color-mix(in srgb, var(--embed-panel-strong) 94%, transparent);
        color: inherit;
        border-radius: 999px;
        padding: 0.25rem 0.55rem;
        cursor: pointer;
      }

      .pendulum-dom-card details {
        margin-top: 0.65rem;
        border-top: 1px solid color-mix(in srgb, var(--embed-border) 55%, transparent);
        padding-top: 0.55rem;
      }

      .pendulum-dom-card summary {
        cursor: pointer;
        color: var(--embed-text-muted);
        font-weight: 600;
      }

      .pendulum-param-fields {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.5rem;
        margin-top: 0.6rem;
      }

      .pendulum-param-field {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.25rem;
      }

      .pendulum-param-field label {
        color: var(--embed-text-muted);
        font-size: 0.92em;
      }

      .pendulum-param-field input {
        width: 100%;
        box-sizing: border-box;
        padding: 0.35rem 0.5rem;
        border-radius: 10px;
        border: 1px solid var(--embed-border);
        background: var(--embed-panel-strong);
        color: inherit;
        font: inherit;
      }

      .pendulum-param-field input[disabled] {
        opacity: 0.72;
        cursor: default;
      }

      .pendulum-trainer-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        margin-top: 0.6rem;
      }

      .pendulum-trainer-actions button {
        appearance: none;
        border: 1px solid var(--embed-border);
        background: color-mix(in srgb, var(--embed-panel-strong) 94%, transparent);
        color: inherit;
        border-radius: 999px;
        padding: 0.35rem 0.7rem;
        font: inherit;
        cursor: pointer;
      }

      .pendulum-trainer-actions button:hover:not(:disabled),
      .pendulum-dom-card .card-remove:hover {
        background: var(--embed-panel-hover);
        border-color: var(--embed-accent);
      }

      .pendulum-trainer-actions button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .pendulum-trainer-status,
      .pendulum-trainer-note {
        margin-top: 0.55rem;
        color: var(--embed-text-muted);
        white-space: pre-line;
      }

      .pendulum-trainer-metrics {
        margin-top: 0.55rem;
        display: grid;
        gap: 0.3rem;
        color: var(--embed-text);
      }

      .centered {
        margin-right: auto;
        margin-left: auto;
        display: block;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #f0f0f0;
        font-size: 24px;
        font-family: Ubuntu-Light, Helvetica, sans-serif;
        text-align: center;
      }

      /* ---------------------------------------------- */
      /* Loading animation from https://loading.io/css/ */
      .lds-dual-ring {
        display: inline-block;
        width: 24px;
        height: 24px;
      }

      .lds-dual-ring:after {
        content: " ";
        display: block;
        width: 24px;
        height: 24px;
        margin: 0px;
        border-radius: 50%;
        border: 3px solid #fff;
        border-color: #fff transparent #fff transparent;
        animation: lds-dual-ring 1.2s linear infinite;
      }

      @keyframes lds-dual-ring {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="embed-dom-toolbar" id="embed_toolbar" hidden>
      <button id="toolbar_pause_button" type="button">Pause</button>
      <button id="toolbar_restart_button" type="button">Restart</button>
      <button id="toolbar_add_pendulum_button" type="button">Add New Pendulum</button>
      <label>
        <span>Speed</span>
        <input id="toolbar_speed_input" type="range" min="1" max="20" step="1" value="1" />
        <span class="toolbar-readout" id="toolbar_speed_value">1x</span>
      </label>
      <label>
        <input id="toolbar_show_graph" type="checkbox" />
        <span>Graph</span>
      </label>
      <label>
        <input id="toolbar_noise_enabled" type="checkbox" />
        <span>Noise</span>
      </label>
      <label>
        <span>Magnitude</span>
        <input id="toolbar_noise_scale" type="range" min="0" max="3" step="0.05" value="0" />
        <span class="toolbar-readout" id="toolbar_noise_value">0.00</span>
      </label>
      <span class="toolbar-readout" id="toolbar_pendulum_count">1 pendulum</span>
    </div>
    <div class="embed-dom-pendulums" id="embed_pendulum_cards" hidden></div>
    <div class="canvas-shell" id="canvas_shell">
      <!-- The WASM code will resize the canvas dynamically -->
      <canvas id="the_canvas_id"></canvas>
    </div>
    <div class="centered" id="center_text">
      <p style="font-size: 16px">Loading…</p>
      <div class="lds-dual-ring"></div>
    </div>

    <script>
      let rustRoboticsBrowserRuntimePromise = null;

      async function getRustRoboticsBrowserRuntime() {
        if (!rustRoboticsBrowserRuntimePromise) {
          rustRoboticsBrowserRuntimePromise = import("./mujoco_runtime.js");
        }
        return rustRoboticsBrowserRuntimePromise;
      }

      window.rustRoboticsOrtSmokeTest = async function (modelBytes, wasmBasePath, config) {
        const runtime = await getRustRoboticsBrowserRuntime();
        return runtime.rustRoboticsOrtSmokeTest(modelBytes, wasmBasePath, config);
      };

      window.rustRoboticsMujocoInit = async function (
        fileEntries,
        policyBytes,
        mujocoWasmBasePath,
        ortWasmBasePath,
        config,
      ) {
        const runtime = await getRustRoboticsBrowserRuntime();
        return runtime.rustRoboticsMujocoInit(
          fileEntries,
          policyBytes,
          mujocoWasmBasePath,
          ortWasmBasePath,
          config,
        );
      };

      window.rustRoboticsMujocoStep = async function (
        stepCount,
        commandVelX,
        commandVelY,
        useSetpointBall,
      ) {
        const runtime = await getRustRoboticsBrowserRuntime();
        return runtime.rustRoboticsMujocoStep(
          stepCount,
          commandVelX,
          commandVelY,
          useSetpointBall,
        );
      };

      window.rustRoboticsMujocoConfigureViewport = function (config) {
        if (!config?.visible && !rustRoboticsBrowserRuntimePromise) {
          return;
        }
        getRustRoboticsBrowserRuntime().then((runtime) => {
          runtime.rustRoboticsMujocoConfigureViewport(config);
        });
      };

      window.rustRoboticsMujocoResetViewportCamera = function () {
        if (!rustRoboticsBrowserRuntimePromise) {
          return;
        }
        getRustRoboticsBrowserRuntime().then((runtime) => {
          runtime.rustRoboticsMujocoResetViewportCamera();
        });
      };

      window.rustRoboticsMujocoReset = function () {
        if (!rustRoboticsBrowserRuntimePromise) {
          return;
        }
        getRustRoboticsBrowserRuntime().then((runtime) => {
          runtime.rustRoboticsMujocoReset();
        });
      };

      window.rustRoboticsMujocoSetCommandSetpoint = function (x, y, z) {
        if (!rustRoboticsBrowserRuntimePromise) {
          return;
        }
        getRustRoboticsBrowserRuntime().then((runtime) => {
          runtime.rustRoboticsMujocoSetCommandSetpoint(x, y, z);
        });
      };
    </script>

    <script type="module">
      import init, * as wasm_bindgen from "./rust_robotics_sim.js";
      import * as ppoBridge from "./ppo_trainer_bridge.js";

      globalThis.wasm_bindgen = wasm_bindgen;
      globalThis.rustRoboticsPpoTrainerCreate = ppoBridge.rustRoboticsPpoTrainerCreate;
      globalThis.rustRoboticsPpoTrainerRecreate = ppoBridge.rustRoboticsPpoTrainerRecreate;
      globalThis.rustRoboticsPpoTrainerRequestTrain = ppoBridge.rustRoboticsPpoTrainerRequestTrain;
      globalThis.rustRoboticsPpoTrainerPoll = ppoBridge.rustRoboticsPpoTrainerPoll;
      globalThis.rustRoboticsPpoTrainerLoadSharedState = ppoBridge.rustRoboticsPpoTrainerLoadSharedState;
      globalThis.rustRoboticsPpoTrainerDestroy = ppoBridge.rustRoboticsPpoTrainerDestroy;
      globalThis.rustRoboticsTestGetState = wasm_bindgen.rust_robotics_test_get_state;
      globalThis.rustRoboticsTestSetMode = wasm_bindgen.rust_robotics_test_set_mode;
      globalThis.rustRoboticsTestSetPaused = wasm_bindgen.rust_robotics_test_set_paused;
      globalThis.rustRoboticsTestRestart = wasm_bindgen.rust_robotics_test_restart;
      globalThis.rustRoboticsTestSetSimSpeed = wasm_bindgen.rust_robotics_test_set_sim_speed;
      globalThis.rustRoboticsTestSetShowGraph = wasm_bindgen.rust_robotics_test_set_show_graph;
      globalThis.rustRoboticsTestSetPendulumNoiseEnabled =
        wasm_bindgen.rust_robotics_test_set_pendulum_noise_enabled;
      globalThis.rustRoboticsTestSetPendulumNoiseScale =
        wasm_bindgen.rust_robotics_test_set_pendulum_noise_scale;
      globalThis.rustRoboticsTestAddPendulum = wasm_bindgen.rust_robotics_test_add_pendulum;
      globalThis.rustRoboticsTestSetPendulumController =
        wasm_bindgen.rust_robotics_test_set_pendulum_controller;
      globalThis.rustRoboticsTestPatchPendulum =
        wasm_bindgen.rust_robotics_test_patch_pendulum;
      globalThis.rustRoboticsTestRemovePendulum =
        wasm_bindgen.rust_robotics_test_remove_pendulum;
      globalThis.rustRoboticsSetEmbedMode = wasm_bindgen.rust_robotics_set_embed_mode;
      globalThis.rustRoboticsTestSetTheme = wasm_bindgen.rust_robotics_test_set_theme;

      let embedStateTimer = null;
      let lastToolbarStateJson = "";

      function detectLocalThemePreference() {
        const params = new URLSearchParams(window.location.search);
        const queryTheme = params.get("theme");
        if (queryTheme === "light" || queryTheme === "dark") {
          return queryTheme;
        }
        return window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
          ? "light"
          : "dark";
      }

      function applyEmbedTheme(theme) {
        const resolvedTheme = theme === "light" ? "light" : "dark";
        document.documentElement.classList.toggle("embedded-theme-light", resolvedTheme === "light");
        document.documentElement.classList.toggle("embedded-theme-dark", resolvedTheme === "dark");
        if (typeof globalThis.rustRoboticsTestSetTheme === "function") {
          try {
            globalThis.rustRoboticsTestSetTheme(resolvedTheme);
          } catch (_error) {
            // Ignore startup races until the wasm bridge is ready.
          }
        }
      }

      window.addEventListener("message", (event) => {
        const data = event.data;
        if (!data || data.type !== "rust-robotics-theme") {
          return;
        }
        applyEmbedTheme(data.theme);
      });

      function pendulumToolbarElements() {
        return {
          root: document.getElementById("embed_toolbar"),
          pause: document.getElementById("toolbar_pause_button"),
          restart: document.getElementById("toolbar_restart_button"),
          addPendulum: document.getElementById("toolbar_add_pendulum_button"),
          speed: document.getElementById("toolbar_speed_input"),
          speedValue: document.getElementById("toolbar_speed_value"),
          showGraph: document.getElementById("toolbar_show_graph"),
          noiseEnabled: document.getElementById("toolbar_noise_enabled"),
          noiseScale: document.getElementById("toolbar_noise_scale"),
          noiseValue: document.getElementById("toolbar_noise_value"),
          pendulumCount: document.getElementById("toolbar_pendulum_count"),
          cards: document.getElementById("embed_pendulum_cards"),
        };
      }

      function commitPendulumPatch(pendulumId, patch) {
        if (typeof globalThis.rustRoboticsTestPatchPendulum !== "function") {
          return;
        }
        globalThis.rustRoboticsTestPatchPendulum(pendulumId, JSON.stringify(patch));
      }

      function setInputValueIfIdle(input, value) {
        if (!input || document.activeElement === input) {
          return;
        }
        input.value = String(value);
      }

      function syncPendulumFieldRows(container, pendulumId, fields) {
        const existing = new Map(
          [...container.querySelectorAll(".pendulum-param-field")].map((field) => [
            field.dataset.fieldKey,
            field,
          ]),
        );

        for (const field of fields) {
          let row = existing.get(field.key);
          if (!row) {
            row = document.createElement("div");
            row.className = "pendulum-param-field";
            row.dataset.fieldKey = field.key;
            row.innerHTML = `
              <label></label>
              <input />
            `;
            container.appendChild(row);
          }

          const label = row.querySelector("label");
          const input = row.querySelector("input");
          label.textContent = field.label;
          input.type = field.type || "number";
          input.step = field.step ?? "0.01";
          if (field.min !== undefined) {
            input.min = String(field.min);
          } else {
            input.removeAttribute("min");
          }
          if (field.max !== undefined) {
            input.max = String(field.max);
          } else {
            input.removeAttribute("max");
          }
          input.disabled = Boolean(field.disabled);

          if (field.disabled) {
            setInputValueIfIdle(input, field.value);
          } else {
            if (!input.dataset.bound) {
              input.addEventListener("change", () => {
                const rawValue =
                  input.type === "number" ? Number.parseFloat(input.value) : input.value;
                if (input.type === "number" && !Number.isFinite(rawValue)) {
                  return;
                }
                const patchBuilder = input.__patchBuilder;
                if (typeof patchBuilder === "function") {
                  commitPendulumPatch(pendulumId, patchBuilder(rawValue));
                }
              });
              input.dataset.bound = "1";
            }
            input.__patchBuilder = field.patch;
            setInputValueIfIdle(input, field.value);
          }

          existing.delete(field.key);
        }

        for (const staleField of existing.values()) {
          staleField.remove();
        }
      }

      function pendulumPlantFields(pendulum) {
        return [
          {
            key: "beam_length",
            label: "Beam Length (m)",
            value: pendulum.pendulum.beam_length.toFixed(2),
            min: 0.1,
            max: 10,
            step: 0.01,
            patch: (value) => ({ beam_length: value }),
          },
          {
            key: "cart_mass",
            label: "Cart Mass (kg)",
            value: pendulum.pendulum.cart_mass.toFixed(2),
            min: 0.1,
            max: 3,
            step: 0.01,
            patch: (value) => ({ cart_mass: value }),
          },
          {
            key: "ball_mass",
            label: "Ball Mass (kg)",
            value: pendulum.pendulum.ball_mass.toFixed(2),
            min: 0.1,
            max: 10,
            step: 0.01,
            patch: (value) => ({ ball_mass: value }),
          },
        ];
      }

      function controllerParamFields(controllerParams) {
        switch (controllerParams.kind) {
          case "lqr":
            return [
              {
                key: "lqr_beam_length",
                label: "Model Beam (m)",
                value: controllerParams.beam_length.toFixed(2),
                min: 0.1,
                max: 10,
                step: 0.01,
                patch: (value) => ({ lqr: { beam_length: value } }),
              },
              {
                key: "lqr_cart_mass",
                label: "Model Cart (kg)",
                value: controllerParams.cart_mass.toFixed(2),
                min: 0.1,
                max: 3,
                step: 0.01,
                patch: (value) => ({ lqr: { cart_mass: value } }),
              },
              {
                key: "lqr_ball_mass",
                label: "Model Ball (kg)",
                value: controllerParams.ball_mass.toFixed(2),
                min: 0.1,
                max: 10,
                step: 0.01,
                patch: (value) => ({ lqr: { ball_mass: value } }),
              },
              {
                key: "lqr_q_position",
                label: "Q Position",
                value: controllerParams.q_position.toFixed(2),
                min: 0,
                max: 100,
                step: 0.01,
                patch: (value) => ({ lqr: { q_position: value } }),
              },
              {
                key: "lqr_q_velocity",
                label: "Q Velocity",
                value: controllerParams.q_velocity.toFixed(2),
                min: 0,
                max: 100,
                step: 0.01,
                patch: (value) => ({ lqr: { q_velocity: value } }),
              },
              {
                key: "lqr_q_angle",
                label: "Q Angle",
                value: controllerParams.q_angle.toFixed(2),
                min: 0,
                max: 100,
                step: 0.01,
                patch: (value) => ({ lqr: { q_angle: value } }),
              },
              {
                key: "lqr_q_angular_velocity",
                label: "Q Ang. Velocity",
                value: controllerParams.q_angular_velocity.toFixed(2),
                min: 0,
                max: 100,
                step: 0.01,
                patch: (value) => ({ lqr: { q_angular_velocity: value } }),
              },
              {
                key: "lqr_r_input",
                label: "R Input",
                value: controllerParams.r_input.toFixed(2),
                min: 0,
                max: 100,
                step: 0.01,
                patch: (value) => ({ lqr: { r_input: value } }),
              },
            ];
          case "pid":
            return [
              {
                key: "pid_kp",
                label: "Kp",
                value: controllerParams.kp.toFixed(2),
                min: 0.01,
                max: 10000,
                step: 0.01,
                patch: (value) => ({ pid: { kp: value } }),
              },
              {
                key: "pid_ki",
                label: "Ki",
                value: controllerParams.ki.toFixed(2),
                min: 0.01,
                max: 10000,
                step: 0.01,
                patch: (value) => ({ pid: { ki: value } }),
              },
              {
                key: "pid_kd",
                label: "Kd",
                value: controllerParams.kd.toFixed(2),
                min: 0.01,
                max: 10000,

      function trainerParamFields(trainer) {

          {

            min: 1,
            max: 32,
            step: 1,
            patch: (value) => ({ policy: { training_updates_per_tick: value } }),
          },
          {
            key: "policy_rollout_steps",
            label: "Rollout",

            min: 32,
            max: 8192,

      function syncPpoTrainerSection(section, pendulum) {
        if (!section) {
          return;
        }

        const trainer = pendulum.policy_trainer;
        section.hidden = pendulum.controller !== "policy";
        if (!trainer) {
          return;
        }

        const toggleButton = section.querySelector(".trainer-toggle-button");
        const resetButton = section.querySelector(".trainer-reset-button");
        const useButton = section.querySelector(".trainer-use-button");
        toggleButton.onclick = () => {
          commitPendulumPatch(pendulum.id, {
            trainer_action: trainer.training_active ? "stop" : "start",
          });
        };
        resetButton.onclick = () => {
          commitPendulumPatch(pendulum.id, { trainer_action: "reset" });
        };
        useButton.onclick = () => {
          commitPendulumPatch(pendulum.id, { trainer_action: "use" });
        };
        toggleButton.textContent = trainer.training_active ? "Stop" : "Train";
        resetButton.disabled = false;
        useButton.disabled = !trainer.snapshot_ready;

        syncPendulumFieldRows(
          section.querySelector(".trainer-params-fields"),
          pendulum.id,
          trainerParamFields(trainer),
        );

        const status = section.querySelector(".pendulum-trainer-status");
        const statusLines = [];
        if (!trainer.initialized) {
          statusLines.push("Trainer not initialized.");
        } else {
          statusLines.push(
            `Replicas ${trainer.total_replicas}/${trainer.ready_replicas}/${trainer.busy_replicas}`,
          );
        }
        if (trainer.training_active && trainer.busy) {
          statusLines.push("Training...");
        }
        if (trainer.last_error) {
          statusLines.push(`Error: ${trainer.last_error}`);
        }
        status.textContent = statusLines.join("\n");

        const metricsRoot = section.querySelector(".pendulum-trainer-metrics");
        if (trainer.metrics) {
          metricsRoot.hidden = false;
          metricsRoot.innerHTML = `
            <div>Upd ${trainer.metrics.total_updates}  Step ${trainer.metrics.total_env_steps}  Ep ${trainer.metrics.total_episodes}</div>
            <div>Ret ${Number(trainer.metrics.last_episode_return).toFixed(2)} / ${Number(trainer.metrics.mean_episode_return).toFixed(2)} / ${Number(trainer.metrics.best_episode_return).toFixed(2)}</div>
            <div>Loss ${Number(trainer.metrics.last_policy_loss).toFixed(3)} / ${Number(trainer.metrics.last_value_loss).toFixed(3)}</div>
          `;
        } else {
          metricsRoot.hidden = true;
          metricsRoot.innerHTML = "";
        }

        section.querySelector(".pendulum-trainer-note").textContent =
          "Changes apply after Reset.";
      }

      function postEmbedHeightFromDom() {
        if (!document.documentElement.classList.contains("embedded-pendulum-dom")) {
          return;
        }
        if (window.parent === window) {
          return;
        }

        const body = document.body;
        if (!body) {
          return;
        }

        const bodyRect = body.getBoundingClientRect();
        const bodyStyle = window.getComputedStyle(body);
        const bodyPaddingBottom = Number.parseFloat(bodyStyle.paddingBottom) || 0;
        const measuredHeight = Math.ceil(
          [...body.children]
            .filter((child) => child instanceof HTMLElement && child.offsetParent !== null)
            .reduce((maxBottom, child) => {
              const childBottom = child.getBoundingClientRect().bottom - bodyRect.top;
              return Math.max(maxBottom, childBottom);
            }, 0) + bodyPaddingBottom,
        );

        const heightWithBuffer =
          measuredHeight
          + (document.documentElement.classList.contains("embedded-pendulum-graph") ? 16 : 0);

        if (!Number.isFinite(heightWithBuffer) || heightWithBuffer <= 0) {
          return;
        }

        window.parent.postMessage(
          {
            type: "rust-robotics-embed-size",
            height: heightWithBuffer,
          },
          "*",
        );
      }

      function bindPendulumEmbedHeightObservers() {
        if (!document.documentElement.classList.contains("embedded-pendulum-dom")) {
          return;
        }
        if (document.documentElement.dataset.embedHeightObserverBound === "1") {
          return;
        }
        document.documentElement.dataset.embedHeightObserverBound = "1";

        if (typeof ResizeObserver !== "undefined") {
          const observer = new ResizeObserver(() => {
            window.requestAnimationFrame(postEmbedHeightFromDom);
          });
          for (const target of [
            document.body,
            document.documentElement,
            document.getElementById("canvas_shell"),
            document.getElementById("embed_toolbar"),
            document.getElementById("embed_pendulum_cards"),
          ]) {
            if (target) {
              observer.observe(target);
            }
          }
        }

        if (typeof MutationObserver !== "undefined") {
          const mutationObserver = new MutationObserver(() => {
            window.requestAnimationFrame(postEmbedHeightFromDom);
          });
          mutationObserver.observe(document.body, {
            childList: true,
            subtree: true,
            attributes: true,
          });
        }
      }

      function renderPendulumCards(state) {
        const elements = pendulumToolbarElements();
        const cardRoot = elements.cards;
        if (!cardRoot) {
          return;
        }
        cardRoot.hidden = false;
        const existing = new Map(
          [...cardRoot.querySelectorAll(".pendulum-dom-card")].map((card) => [
            Number.parseInt(card.dataset.pendulumId || "0", 10),
            card,
          ]),
        );

        for (const pendulum of state.pendulums || []) {
          let card = existing.get(pendulum.id);
          if (!card) {
            card = document.createElement("section");
            card.className = "pendulum-dom-card";
            card.dataset.pendulumId = String(pendulum.id);
            card.innerHTML = `
              <div class="pendulum-dom-card-header">
                <strong>Pendulum ${pendulum.id}</strong>
                <button type="button" class="card-remove">Remove</button>
              </div>
              <select>
                <option value="lqr">LQR</option>
                <option value="pid">PID</option>
                <option value="mpc">MPC</option>
                <option value="policy">PPO Policy</option>
              </select>
              <details class="pendulum-params-section">
                <summary>Pendulum Parameters</summary>
                <div class="pendulum-param-fields pendulum-params-fields"></div>
              </details>
              <details class="controller-params-section">
                <summary>Controller Parameters</summary>
                <div class="pendulum-param-fields controller-params-fields"></div>
              </details>
              <details class="ppo-trainer-section">
                <summary>PPO Trainer</summary>
                <div class="pendulum-trainer-actions">
                  <button type="button" class="trainer-toggle-button">Train</button>
                  <button type="button" class="trainer-reset-button">Reset</button>
                  <button type="button" class="trainer-use-button">Use</button>
                </div>
                <div class="pendulum-trainer-status"></div>
                <div class="pendulum-trainer-metrics" hidden></div>
                <div class="pendulum-param-fields trainer-params-fields"></div>
                <div class="pendulum-trainer-note"></div>
              </details>
            `;
            const removeButton = card.querySelector(".card-remove");
            removeButton.addEventListener("click", () => {
              globalThis.rustRoboticsTestRemovePendulum(pendulum.id);
            });
            const select = card.querySelector("select");
            select.addEventListener("change", () => {
              globalThis.rustRoboticsTestSetPendulumController(pendulum.id, select.value);
            });
            cardRoot.appendChild(card);
          }

          card.querySelector("strong").textContent = `Pendulum ${pendulum.id}`;
          const removeButton = card.querySelector(".card-remove");
          removeButton.style.display = (state.pendulum_count || 0) > 1 ? "" : "none";
          const select = card.querySelector("select");
          if (document.activeElement !== select) {
            select.value = pendulum.controller;
          }
          syncPendulumFieldRows(
            card.querySelector(".pendulum-params-fields"),
            pendulum.id,
            pendulumPlantFields(pendulum),
          );
          syncPendulumFieldRows(
            card.querySelector(".controller-params-fields"),
            pendulum.id,
            controllerParamFields(pendulum.controller_params),
          );
          syncPpoTrainerSection(card.querySelector(".ppo-trainer-section"), pendulum);
          existing.delete(pendulum.id);
        }

        for (const staleCard of existing.values()) {
          staleCard.remove();
        }
      }

      function syncPendulumToolbar(state) {
        const elements = pendulumToolbarElements();
        if (!state || state.mode !== "inverted_pendulum") {
          return;
        }

        const snapshot = JSON.stringify({
          mode: state.mode,
          paused: state.paused,
          show_graph: state.show_graph,
          sim_speed: state.sim_speed,
          pendulum_noise_enabled: state.pendulum_noise_enabled,
          pendulum_noise_scale: state.pendulum_noise_scale,
          pendulum_count: state.pendulum_count,
          pendulums: state.pendulums,
        });
        if (snapshot === lastToolbarStateJson) {
          return;
        }
        lastToolbarStateJson = snapshot;

        elements.pause.textContent = state.paused ? "Play" : "Pause";
        elements.speed.value = String(state.sim_speed);
        elements.speedValue.textContent = `${state.sim_speed}x`;
        elements.showGraph.checked = Boolean(state.show_graph);
        elements.noiseEnabled.checked = state.pendulum_noise_enabled;
        elements.noiseScale.value = String(state.pendulum_noise_scale);
        elements.noiseScale.disabled = !state.pendulum_noise_enabled;
        elements.noiseValue.textContent = Number(state.pendulum_noise_scale).toFixed(2);
        elements.pendulumCount.textContent =
          `${state.pendulum_count} pendulum${state.pendulum_count === 1 ? "" : "s"}`;
        document.documentElement.classList.toggle(
          "embedded-pendulum-graph",
          Boolean(state.show_graph),
        );
        renderPendulumCards(state);
        window.requestAnimationFrame(postEmbedHeightFromDom);
      }

      function startPendulumToolbarStateLoop() {
        if (embedStateTimer !== null) {
          return;
        }
        embedStateTimer = window.setInterval(() => {
          if (typeof globalThis.rustRoboticsTestGetState !== "function") {
            return;
          }
          try {
            const state = globalThis.rustRoboticsTestGetState();
            syncPendulumToolbar(state);
          } catch (_error) {
            // Ignore transient startup races while the wasm app finishes booting.
          }
        }, 200);
      }

      function setupPendulumEmbedToolbar() {
        const elements = pendulumToolbarElements();
        elements.root.hidden = false;

        if (!elements.root.dataset.bound) {
          elements.pause.addEventListener("click", () => {
            try {
              const state = globalThis.rustRoboticsTestGetState();
              globalThis.rustRoboticsTestSetPaused(!state.paused);
            } catch (_error) {}
          });

          elements.restart.addEventListener("click", () => {
            globalThis.rustRoboticsTestRestart();
          });

          elements.addPendulum.addEventListener("click", () => {
            globalThis.rustRoboticsTestAddPendulum();
          });

          elements.speed.addEventListener("input", () => {
            const value = Number.parseInt(elements.speed.value, 10) || 1;
            elements.speedValue.textContent = `${value}x`;
            globalThis.rustRoboticsTestSetSimSpeed(value);
          });

          elements.showGraph.addEventListener("change", () => {
            document.documentElement.classList.toggle(
              "embedded-pendulum-graph",
              elements.showGraph.checked,
            );
            globalThis.rustRoboticsTestSetShowGraph(elements.showGraph.checked);
            window.requestAnimationFrame(postEmbedHeightFromDom);
          });

          elements.noiseEnabled.addEventListener("change", () => {
            globalThis.rustRoboticsTestSetPendulumNoiseEnabled(elements.noiseEnabled.checked);
            elements.noiseScale.disabled = !elements.noiseEnabled.checked;
          });

          elements.noiseScale.addEventListener("input", () => {
            const value = Number.parseFloat(elements.noiseScale.value) || 0;
            elements.noiseValue.textContent = value.toFixed(2);
            globalThis.rustRoboticsTestSetPendulumNoiseScale(value);
          });

        elements.root.dataset.bound = "1";
      }

        bindPendulumEmbedHeightObservers();
        startPendulumToolbarStateLoop();
        window.addEventListener("resize", postEmbedHeightFromDom, { passive: true });
        window.requestAnimationFrame(postEmbedHeightFromDom);
      }

      function applyInitialSimulatorStateFromQuery() {
        const params = new URLSearchParams(window.location.search);
        const mode = params.get("mode");
        const paused = params.get("paused");
        const restart = params.get("restart");
        const embed = params.get("embed");

        if (embed === "focused") {
          document.documentElement.classList.add("embedded-focused");
        }

        if (embed === "focused" && mode === "inverted_pendulum") {
          document.documentElement.classList.add("embedded-pendulum-dom");
          setupPendulumEmbedToolbar();
        }

        applyEmbedTheme(detectLocalThemePreference());

        if (mode && typeof globalThis.rustRoboticsTestSetMode === "function") {
          try {
            globalThis.rustRoboticsTestSetMode(mode);
          } catch (error) {
            console.warn("Failed to apply simulator mode from query string:", error);
          }
        }

        if (embed && typeof globalThis.rustRoboticsSetEmbedMode === "function") {
          try {
            globalThis.rustRoboticsSetEmbedMode(embed);
          } catch (error) {
            console.warn("Failed to apply embed mode from query string:", error);
          }
        }

        if (paused !== null && typeof globalThis.rustRoboticsTestSetPaused === "function") {
          try {
            const pausedValue = paused === "1" || paused === "true";
            globalThis.rustRoboticsTestSetPaused(pausedValue);
          } catch (error) {
            console.warn("Failed to apply paused state from query string:", error);
          }
        }

        if ((restart === "1" || restart === "true")
          && typeof globalThis.rustRoboticsTestRestart === "function") {
          try {
            globalThis.rustRoboticsTestRestart();
          } catch (error) {
            console.warn("Failed to apply restart from query string:", error);
          }
        }
      }

      console.log("=== SCRIPT START ===");
      console.log("loading wasm…");
      init({ module_or_path: "./rust_robotics_sim_bg.wasm" })
        .then(on_wasm_loaded)
        .catch(on_wasm_error);

      async function on_wasm_loaded() {
        console.log("=== WASM LOADED ===");

        const canvas = document.getElementById("the_canvas_id");
        console.log("Canvas before start:", canvas.width, "x", canvas.height);
        console.log("Canvas clientSize:", canvas.clientWidth, "x", canvas.clientHeight);

        try {
          console.log("=== STARTING APP ===");
          applyEmbedTheme(detectLocalThemePreference());
          await wasm_bindgen.start("the_canvas_id");
          console.log("=== APP STARTED ===");
          console.log("Canvas after start:", canvas.width, "x", canvas.height);
          requestAnimationFrame(() => {
            applyInitialSimulatorStateFromQuery();
          });

          document.getElementById("center_text").remove();
        } catch (e) {
          console.error("Error starting app:", e);
          on_wasm_error(e);
        }
      }

      function on_wasm_error(error) {
        console.error("Failed to start: " + error);
        document.getElementById("center_text").innerHTML = `
                <p>
                    An error occurred during loading:
                </p>
                <p style="font-family:Courier New">
                    ${error}
                </p>
                <p style="font-size:14px">
                    Make sure you use a modern browser with WebGL and WASM enabled.
                </p>`;
      }
    </script>

    <!-- Unregister any stale service workers -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (let registration of registrations) {
            registration.unregister();
            console.log("Unregistered stale service worker");
          }
        });
      }
    </script>
